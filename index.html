<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altın Portföy</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 10px 6px 50px;
    background: #ede8de;
    font-family: 'SF Pro Display', system-ui, sans-serif;
}

@media (min-height: 800px) {
    body { align-items: center; }
}



/* ===== ANA KART ===== */
.w {
    background: linear-gradient(160deg, #fdfaf3 0%, #f5f0e8 40%, #ede8dc 100%);
    border-radius: 28px;
    padding: 22px 18px 18px;
    /* Viewport algısı ne olursa olsun kart akıcı şekilde büyüsün */
    width: clamp(320px, 94vw, 900px);
    margin: 0 auto;
    position: relative;
    transform-style: preserve-3d;
    /* Fontları viewport yerine kartın KENDİ genişliğine bağlamak için */
    container-type: inline-size;
    container-name: kart;
    box-shadow:
        0 1px 0 0 rgba(255,255,255,0.9) inset,
        0 -1px 0 0 rgba(0,0,0,0.08) inset,
        0 4px 0 rgba(240,180,30,0.6),
        0 8px 0 rgba(200,140,15,0.3),
        0 16px 24px rgba(180,120,0,0.15),
        0 40px 50px rgba(0,0,0,0.08);
    border: 1.5px solid #f0c040;
    border-top-color: #ffe680;
    border-bottom-color: #b8860b;
    outline: none;
    filter: drop-shadow(0 0 8px rgba(255,185,0,0.3));
}

/* ===== HEADER ===== */
.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
}
.topleft {
    font-size: clamp(11px, 2.6cqi, 16px);
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #b0a080;
}
.topright {
    display: flex;
    align-items: center;
    gap: 5px;
}
.livedot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #b8872a;
    animation: gl 2s infinite;
}
@keyframes gl { 0%,100%{opacity:1;} 50%{opacity:.3;} }
.livetime {
    font-size: clamp(11px, 2.4cqi, 14px);
    color: #b0a080;
    font-weight: 600;
    letter-spacing: .06em;
}

/* ===== FİYAT SATIRLARI ===== */
.prices {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    overflow: visible;
}
.pline {
    flex: 1;
    border-radius: 16px;
    background: linear-gradient(160deg, #fffef9 0%, #fff 50%, #fdf8ee 100%);
    border: 1.5px solid #f0c040;
    border-top-color: #ffe680;
    border-bottom-color: #c8a030;
    padding: 12px 10px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: visible;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow:
        0 1px 0 0 rgba(255,255,255,0.95) inset,
        0 3px 0 rgba(240,175,25,0.5),
        0 6px 0 rgba(185,125,8,0.2),
        0 14px 18px rgba(0,0,0,0.08);
    filter: drop-shadow(0 0 5px rgba(255,185,0,0.25));
}
.pline:hover {
    transform: translateY(-2px);
    box-shadow:
        0 1px 0 0 rgba(255,255,255,0.95) inset,
        0 4px 0 rgba(245,185,30,0.6),
        0 8px 0 rgba(195,135,10,0.25),
        0 18px 22px rgba(0,0,0,0.10);
    filter: drop-shadow(0 0 8px rgba(255,185,0,0.38));
}
.pline::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    border-radius: 16px 16px 0 0;
    background: linear-gradient(90deg, transparent, rgba(255,230,100,0.9), transparent);
}
.pline-type {
    font-size: clamp(13px, 3cqi, 19px);
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #b0a080;
    text-align: center;
}
.pline-pills {
    display: flex;
    gap: 0;
    width: 100%;
    border-top: 1px solid #e8dfc4;
    padding-top: 10px;
}
.pill {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: center;
    text-align: center;
    padding: 4px 4px;
    position: relative;
    overflow: hidden;
}
.pill:first-child {
    border-right: 1px solid #e8dfc4;
}
.pill-k {
    font-size: clamp(12px, 2.6cqi, 16px);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #c0b080;
}
.pill-v {
    font-size: clamp(18px, 5.5cqi, 26px);
    font-weight: 800;
    color: #1a1508;
    letter-spacing: -.01em;
    white-space: nowrap;
    overflow: visible;
    max-width: 100%;
}
.pill-v.up { color: #16a34a; }
.pill-v.down { color: #c05a20; }
.pill-v.man { color: #4a4a4a; font-size: 12px; }

.fv-green-flash { animation: flashGreen 1.2s ease; }
.fv-red-flash   { animation: flashRed  1.2s ease; }
@keyframes flashGreen { 0%,100%{background:transparent} 30%{background:rgba(34,197,94,0.18)} }
@keyframes flashRed   { 0%,100%{background:transparent} 30%{background:rgba(220,38,38,0.15)} }

.div { height: 1px; background: #e8e0cc; margin: 0 0 16px; }

/* ===== BÜYÜK SAYI — 3D PLAKA ===== */
.big {
    margin-bottom: 16px;
    perspective: 900px;
}
.big-inner {
    position: relative;
    background: linear-gradient(145deg, #1c1405 0%, #2a1e06 40%, #1a1200 100%);
    border-radius: 20px;
    padding: 20px 18px 22px;
    text-align: center;
    border: 1.5px solid #4a3510;
    border-top-color: #7a5c20;
    transform: rotateX(3deg);
    transform-style: preserve-3d;
    box-shadow:
        0 1px 0 rgba(255,220,80,0.18) inset,
        0 -1px 0 rgba(0,0,0,0.4) inset,
        0 5px 0 rgba(180,120,5,0.7),
        0 10px 0 rgba(130,80,0,0.35),
        0 18px 28px rgba(0,0,0,0.28),
        0 4px 12px rgba(255,180,0,0.12);
    transition: transform .2s, box-shadow .2s;
}
.big-inner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    border-radius: 20px 20px 0 0;
    background: linear-gradient(90deg, transparent 5%, rgba(255,220,80,0.6) 50%, transparent 95%);
}
.big-inner::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,210,60,0.08) 0%, transparent 65%);
    pointer-events: none;
}
.big:hover .big-inner {
    transform: rotateX(1deg) translateY(-2px);
    box-shadow:
        0 1px 0 rgba(255,220,80,0.22) inset,
        0 -1px 0 rgba(0,0,0,0.4) inset,
        0 7px 0 rgba(180,120,5,0.75),
        0 14px 0 rgba(130,80,0,0.38),
        0 24px 36px rgba(0,0,0,0.30),
        0 6px 18px rgba(255,180,0,0.16);
}
.big-label {
    font-size: clamp(10px, 2.4cqi, 14px);
    font-weight: 700;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #c8a860;
    margin-bottom: 10px;
    opacity: 0.85;
}
.big-num {
    font-size: clamp(52px, 17cqi, 92px);
    font-weight: 900;
    color: #fff8e8;
    letter-spacing: -.04em;
    line-height: 1;
    text-shadow:
        0 1px 2px rgba(0,0,0,0.5),
        0 0 30px rgba(255,200,50,0.25);
}
.big-num .lira-sym {
    font-size: 0.38em;
    color: #c8a860;
    font-weight: 600;
    vertical-align: super;
    margin-right: 3px;
    opacity: 0.9;
}
#nisapTutari {
    color: #fff8e8 !important;
    font-size: inherit;
    vertical-align: baseline;
}
.big-meta { display: none; }

.div2 { height: 1px; background: #e8e0cc; margin: 0 0 16px; }

.holdings {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    overflow: visible;
}
.hbox {
    flex: 1;
    padding: 14px 10px;
    border-radius: 14px;
    background: linear-gradient(160deg, #fffef9 0%, #fff 50%, #fdf8ee 100%);
    border: 1.5px solid #f0c040;
    position: relative;
    overflow: visible;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    text-align: center;
    box-shadow:
        0 1px 0 0 rgba(255,255,255,0.95) inset,
        0 3px 0 rgba(240,175,25,0.55),
        0 6px 0 rgba(195,135,10,0.22),
        0 14px 16px rgba(0,0,0,0.07);
    filter: drop-shadow(0 0 5px rgba(255,180,0,0.25));
}
.hbox:hover {
    transform: translateY(-2px);
    box-shadow:
        0 1px 0 0 rgba(255,255,255,0.95) inset,
        0 4px 0 rgba(245,185,30,0.65),
        0 8px 0 rgba(200,140,12,0.28),
        0 18px 20px rgba(0,0,0,0.09);
    filter: drop-shadow(0 0 8px rgba(255,185,0,0.38));
}
.hbox::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 0 0 14px 14px;
}
.hbox-gram::after  { background: linear-gradient(90deg, #ffe066, #f0c040, transparent); box-shadow: 0 0 6px rgba(255,200,40,0.6); }
.hbox-ceyrek::after{ background: linear-gradient(90deg, #ffe066, #f0c040, transparent); box-shadow: 0 0 6px rgba(255,200,40,0.6); }
.hbox-total::after { background: linear-gradient(90deg, #ffe066, #f0c040, #ffe066); box-shadow: 0 0 8px rgba(255,200,40,0.7); }
.hbox-k {
    font-size: clamp(11px, 2.4cqi, 14px);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #c0b080;
    margin-bottom: 6px;
}
.hbox-v {
    font-size: clamp(24px, 8cqi, 36px);
    font-weight: 900;
    color: #1a1508;
    letter-spacing: -.03em;
    line-height: 1;
}
.hbox-u {
    font-size: clamp(12px, 2.6cqi, 15px);
    font-weight: 600;
    color: #c0b080;
    margin-top: 4px;
}
/* Toplam kutusu tıklanamaz görünümü */
.hbox-total {
    cursor: default;
}
.hbox-total:hover {
    transform: none;
    box-shadow:
        0 1px 0 0 rgba(255,255,255,0.95) inset,
        0 3px 0 rgba(240,175,25,0.55),
        0 6px 0 rgba(195,135,10,0.22),
        0 14px 16px rgba(0,0,0,0.07);
    filter: drop-shadow(0 0 5px rgba(255,180,0,0.25));
}

/* ===== MANUEL BAR ===== */
.mbar {
    background: linear-gradient(160deg, #fffef9 0%, #fff 50%, #fdf8ee 100%);
    border: 1.5px solid #f0c040;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    flex-direction: row;
    gap: 10px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow:
        0 1px 0 0 rgba(255,255,255,0.95) inset,
        0 3px 0 rgba(240,178,28,0.52),
        0 6px 0 rgba(190,128,8,0.22),
        0 14px 16px rgba(0,0,0,0.07);
    filter: drop-shadow(0 0 5px rgba(255,178,0,0.25));
}
.mbar:hover {
    transform: translateY(-2px);
    box-shadow:
        0 1px 0 0 rgba(255,255,255,0.95) inset,
        0 4px 0 rgba(245,188,32,0.64),
        0 8px 0 rgba(200,138,10,0.28),
        0 18px 20px rgba(0,0,0,0.09);
    filter: drop-shadow(0 0 8px rgba(255,185,0,0.38));
}
.mbar-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.mbar-l {
    font-size: clamp(11px, 2.4cqi, 14px);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #b0a080;
}
.mbar-v {
    font-size: clamp(16px, 3.4cqi, 21px);
    font-weight: 800;
    color: #4a4a4a;
}
.mbar-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 0 0 auto;
}
.mbar-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-left: 1px solid #e8e0cc;
    padding-left: 12px;
}
.mbar-right-label {
    font-size: clamp(10px, 2.4cqi, 14px);
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #b0a080;
    margin-bottom: 4px;
}
.mbar-right-val {
    font-size: clamp(24px, 8cqi, 36px);
    font-weight: 900;
    color: #4a4a4a;
    letter-spacing: -.03em;
    line-height: 1;
    text-align: center;
}
.mbar-right-icon {
    font-size: 16px;
    color: #b0a080;
    font-weight: 600;
    vertical-align: super;
    margin-right: 1px;
}
.mbar-detail {
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.mbar-chip {
    background: #f5f0e8;
    border-radius: 9px;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 130px;
    align-items: center;
    text-align: center;
}
.mbar-chip-k {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #c0b080;
}
.mbar-chip-v {
    font-size: clamp(15px, 3.2cqi, 20px);
    font-weight: 800;
    color: #1a1508;
}
.mbar-chip-v.man { color: #4a4a4a; }

/* ===== BUTONLAR ===== */
.btns { display: flex; gap: 8px; }
.btn {
    flex: 1;
    padding: 13px;
    border-radius: 14px;
    cursor: pointer;
    font-size: clamp(13px, 2.8cqi, 16px);
    font-weight: 700;
    letter-spacing: .02em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: transform .15s, box-shadow .15s;
    position: relative;
    overflow: visible;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
.btn-a {
    background: linear-gradient(160deg, #2a2010 0%, #1a1508 100%);
    color: #f5f0e8;
    border: 1.5px solid #4a3010;
    border-top-color: #6a5020;
    box-shadow:
        0 1px 0 0 rgba(255,255,255,0.12) inset,
        0 3px 0 rgba(240,175,25,0.5),
        0 6px 0 rgba(185,125,8,0.2),
        0 12px 14px rgba(0,0,0,0.12);
}
.btn-b {
    background: linear-gradient(160deg, #fffef9 0%, #fff 50%, #fdf8ee 100%);
    color: #b0a080;
    border: 1.5px solid #f0c040;
    border-top-color: #ffe680;
    border-bottom-color: #c8a030;
    box-shadow:
        0 1px 0 0 rgba(255,255,255,0.95) inset,
        0 3px 0 rgba(240,175,25,0.5),
        0 6px 0 rgba(185,125,8,0.2),
        0 12px 14px rgba(0,0,0,0.07);
    filter: drop-shadow(0 0 5px rgba(255,185,0,0.22));
}

/* ===== ZEKAT ===== */
.zekat {
    margin-top: 14px;
    text-align: center;
    font-size: clamp(11px, 2.4cqi, 14px);
    font-weight: 600;
    color: #c0b080;
    letter-spacing: .04em;
}

/* ===== STATUS BADGE ===== */
.status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .04em;
    white-space: nowrap;
    flex-shrink: 0;
}
.status-online  { background: #d4edda; color: #155724; }
.status-offline { background: #f8d7da; color: #721c24; }
.status-loading { background: #d1ecf1; color: #0c5460; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.6;} }

.loading {
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid rgba(12,84,96,.3);
    border-top: 2px solid #0c5460;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}
@keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

/* ===== PULL TO REFRESH ===== */
.pull-to-refresh {
    position: fixed;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(45deg, #b8872a, #c0a060);
    color: white;
    padding: 12px 20px;
    border-radius: 25px;
    font-size: 13px;
    z-index: 1000;
    transition: top .3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 15px rgba(184,135,42,0.35);
}
.pull-to-refresh.show { top: 20px; }
.refresh-spinner {
    width: 18px; height: 18px;
    border: 2px solid transparent;
    border-top: 2px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

/* ===== FULLSCREEN KART OVERLAY ===== */
.kart-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 8888;
    background: transparent;
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(0px);
    align-items: center;
    justify-content: center;
    padding: 16px;
    transition: none;
}
.kart-overlay.acik {
    display: flex;
    animation: overlayFadeIn 0.3s ease forwards;
}
@keyframes overlayFadeIn {
    from { background: rgba(15,15,35,0); backdrop-filter: blur(0px); }
    to   { background: rgba(15,15,35,0.6); backdrop-filter: blur(12px); }
}
.kart-fs {
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    border-radius: 24px;
    padding: 0;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.12);
    animation: kartPopIn 0.25s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    position: relative;
}
@keyframes kartPopIn {
    from { transform: scale(0.93); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
}

.kart-fs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid rgba(0,0,0,0.07);
}
.kart-fs-title-block { flex: 1; }
.kart-fs .kart-fs-title {
    font-size: clamp(17px, 5.5cqi, 22px);
    font-weight: 800;
    letter-spacing: -0.01em;
    margin: 0 0 2px 0;
    padding: 0;
    border: none;
    text-transform: none;
}
.kart-fs .kart-fs-subtitle {
    font-size: clamp(11px, 3.2cqi, 14px);
    color: #999;
    font-weight: 500;
}
.kart-fs-close-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.07);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .15s, transform .15s;
    color: #666;
    font-size: 16px;
    font-weight: 700;
}
.kart-fs-close-btn:hover { background: rgba(0,0,0,0.13); transform: scale(1.08); }
.kart-fs-body { padding: 8px 16px 24px; }
.kart-fs .kart-fs-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 10px;
    border-radius: 12px;
    margin: 4px 0;
    gap: 10px;
    transition: background .12s;
    min-width: 0;
    overflow: hidden;
}
.kart-fs .kart-fs-row:hover { background: rgba(0,0,0,0.03); }
.kart-fs .kart-fs-row-divider {
    border-top: 1px solid rgba(0,0,0,0.06);
    margin: 4px 10px;
}
.kart-fs .kart-fs-label {
    font-size: clamp(14px, 4.3cqi, 18px);
    color: #8a8a9a;
    font-weight: 500;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
}
.kart-fs .kart-fs-label-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.kart-fs .kart-fs-val {
    font-size: clamp(15px, 4.8cqi, 22px);
    font-weight: 800;
    text-align: right;
    letter-spacing: -0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
}

/* kart fiyat bandı */
.kart-price-band {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    margin: 0 16px 0;
    padding: 14px 16px;
    border-radius: 14px;
    background: linear-gradient(135deg, #f0faf0 0%, #e8f5e8 50%, #fdf0f0 100%);
    border: 1px solid rgba(0,0,0,0.07);
}

function saatiGuncelle() {

// =============================================
// FULLSCREEN KART SİSTEMİ
// =============================================
function kartAc(tip) {
    const overlay = document.getElementById('kartOverlay');
    const icerik  = document.getElementById('kartFsIcerik');

    function row(label, val, valColor, dotColor) {
        return `<div class="kart-fs-row">
            <span class="kart-fs-label">
                <span class="kart-fs-label-dot" style="background:${dotColor||'#ccc'}"></span>
                ${label}
            </span>
            <span class="kart-fs-val" style="color:${valColor||'#222'}">${val}</span>
        </div>`;
    }

    function header(title, subtitle) {
        return `<div class="kart-fs-header">
            <div class="kart-fs-title-block">
                <div class="kart-fs-title">${title}</div>
                <div class="kart-fs-subtitle">${subtitle}</div>
            </div>
            <button class="kart-fs-close-btn" onclick="event.stopPropagation();kartKapat()">✕</button>
        </div>`;
    }

    let html = '';

    if (tip === 'gram') {
        const alis  = document.getElementById('gramAnlikAlisFiyat')?.textContent  || '--';
        const satis = document.getElementById('gramAnlikSatisFiyat')?.textContent || '--';
        const man   = document.getElementById('manuelGramDisplay')?.textContent   || '--';
        const badge = document.getElementById('fpGramMiktarBadge')?.textContent   || '';
        html = `<div class="kart-fs kart-fs-gram">
            ${header('Gram Altın', badge ? 'Miktar: ' + badge : 'Güncel fiyatlar')}
            <div class="kart-fs-body">
                ${row('Alış Fiyatı', alis, '#2E7D32', '#66BB6A')}
                ${row('Satış Fiyatı', satis, '#C62828', '#EF5350')}
                <div class="kart-fs-row-divider"></div>
                ${row('Manuel Fiyat', man, '#3d3d3d', '#666666')}
            </div>
        </div>`;
    } else if (tip === 'ceyrek') {
        const alis  = document.getElementById('ceyrekAnlikAlisFiyat')?.textContent  || '--';
        const satis = document.getElementById('ceyrekAnlikSatisFiyat')?.textContent || '--';
        const man   = document.getElementById('manuelCeyrekDisplay')?.textContent   || '--';
        const badge = document.getElementById('fpCeyrekMiktarBadge')?.textContent   || '';
        html = `<div class="kart-fs kart-fs-ceyrek">
            ${header('Çeyrek Altın', badge ? 'Miktar: ' + badge : 'Güncel fiyatlar')}
            <div class="kart-fs-body">
                ${row('Alış Fiyatı', alis, '#2E7D32', '#66BB6A')}
                ${row('Satış Fiyatı', satis, '#C62828', '#EF5350')}
                <div class="kart-fs-row-divider"></div>
                ${row('Manuel Fiyat', man, '#3d3d3d', '#666666')}
            </div>
        </div>`;
    }

    if (!html) return;

    icerik.innerHTML = html;
    overlay.style.display = 'flex';
    requestAnimationFrame(() => { overlay.classList.add('acik'); });
    document.body.style.overflow = 'hidden';
}

function kartKapat() {
    const overlay = document.getElementById('kartOverlay');
    if (!overlay) return;
    overlay.classList.remove('acik');
    overlay.style.display = 'none';
    document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') kartKapat();
});
</script>

<script>
// =============================================
// VERİ & HESAPLAMA

const ZEKAT_NISAB  = 80.18;
const ZEKAT_TARIHI = new Date('2026-03-05');
const PROXY_URL    = 'https://altinzekat.netlify.app/.netlify/functions/fiyat';
const VERI_URL     = 'https://altinzekat.netlify.app/.netlify/functions/getData';
const SAVE_URL     = 'https://altinzekat.netlify.app/.netlify/functions/saveData';

// XMLHttpRequest ile HTTP istekleri (Capacitor XHR'ı native'e çevirir)
function httpGet(url) {
    return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.setRequestHeader('Accept', 'application/json');
        xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
        xhr.responseType = 'text';
        xhr.timeout = 15000;
        xhr.onload = function() {
            try {
                let text = xhr.responseText || '';
                text = text.trim();
                // BOM temizle
                if (text.charCodeAt(0) === 0xFEFF) text = text.substring(1);
                // HTML geliyorsa hata ver
                if (text.startsWith('<')) { reject(new Error('Sunucu HTML döndü: ' + text.substring(0, 80))); return; }
                if (!text) { reject(new Error('Boş yanıt')); return; }
                resolve(JSON.parse(text));
            } catch(e) {
                reject(new Error('Parse: ' + (xhr.responseText||'').substring(0, 80)));
            }
        };
        xhr.onerror = function() { reject(new Error('XHR onerror')); };
        xhr.ontimeout = function() { reject(new Error('Zaman aşımı')); };
        xhr.send();
    });
}

function httpPost(url, body) {
    return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', url, true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        xhr.timeout = 15000;
        xhr.onload = function() {
            if (xhr.status >= 200 && xhr.status < 300) {
                try {
                    let text = xhr.responseText.trim();
                    if (text.charCodeAt(0) === 0xFEFF) text = text.substring(1);
                    resolve(JSON.parse(text));
                }
                catch(e) { reject(new Error('Parse hatası: ' + xhr.responseText.substring(0, 100))); }
            } else { reject(new Error('HTTP ' + xhr.status)); }
        };
        xhr.onerror = function() { reject(new Error('Bağlantı hatası')); };
        xhr.ontimeout = function() { reject(new Error('Zaman aşımı')); };
        xhr.send(body);
    });
}

const veriler = {

    manuelGramTarih: null,
    manuelCeyrekTarih: null
};

// ============================================================
// SPARKLINE & DEĞİŞİM
// ============================================================
const portfolyoGecmis = [];
const SPARKLINE_MAX = 20;
let portfolyoOncekiDeger = null;
let portfolyoIlkYukleme = true;

function portfolyoSparklineGuncelle(anlikDeger) {
    if (!anlikDeger || anlikDeger <= 0) return;

    const tutarEl  = document.getElementById('portfolyoDegisimTutar');
    const deltaBox = document.getElementById('portfolyoDeltaBox');
    const deltaOk  = document.getElementById('portfolyoDeltaOk');

    const son = portfolyoGecmis[portfolyoGecmis.length - 1];
    if (son !== anlikDeger) {
        portfolyoGecmis.push(anlikDeger);
        if (portfolyoGecmis.length > SPARKLINE_MAX) portfolyoGecmis.shift();
    }

    if (portfolyoIlkYukleme) {
        portfolyoOncekiDeger = anlikDeger;
        portfolyoIlkYukleme = false;
        if (tutarEl)  tutarEl.textContent = '0 TL bu seans';
        if (deltaOk)  deltaOk.textContent = '↕';
        sparklineCiz(portfolyoGecmis, '#b0a080', true);
        return;
    }

    const degisimTutar = anlikDeger - portfolyoOncekiDeger;
    portfolyoOncekiDeger = anlikDeger;
    const pozitif = degisimTutar >= 0;
    const renk    = pozitif ? '#16a34a' : '#c05a20';
    const isaret  = pozitif ? '+' : '';

    if (tutarEl)  { tutarEl.textContent = isaret + Math.round(degisimTutar).toLocaleString('tr-TR') + ' TL bu seans'; tutarEl.style.color = renk; }
    if (deltaOk)  { deltaOk.textContent = pozitif ? '↑' : '↓'; deltaOk.style.color = renk; }
    if (deltaBox) {
        if (pozitif) { deltaBox.classList.add('up'); }
        else         { deltaBox.classList.remove('up'); }
    }

    sparklineCiz(portfolyoGecmis, renk, pozitif);
}

function sparklineCiz(verilerArr, renk, yukari) {
    const canvas = document.getElementById('portfolyoSparkline');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    if (verilerArr.length < 2) { canvas.style.display = 'none'; return; }
    canvas.style.display = 'block';

    const min = Math.min(...verilerArr);
    const max = Math.max(...verilerArr);
    const aralik = max - min || 1;
    const pad = 4;
    const xAdim = (W - pad * 2) / (verilerArr.length - 1);

    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, renk + '55');
    grad.addColorStop(1, renk + '00');

    ctx.beginPath();
    verilerArr.forEach((v, i) => {
        const x = pad + i * xAdim;
        const y = pad + (1 - (v - min) / aralik) * (H - pad * 2);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    const lastX = pad + (verilerArr.length - 1) * xAdim;
    ctx.lineTo(lastX, H); ctx.lineTo(pad, H); ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();

    ctx.beginPath();
    verilerArr.forEach((v, i) => {
        const x = pad + i * xAdim;
        const y = pad + (1 - (v - min) / aralik) * (H - pad * 2);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = renk; ctx.lineWidth = 2.2; ctx.lineJoin = 'round'; ctx.stroke();

    const lastV = verilerArr[verilerArr.length - 1];
    const lastY = pad + (1 - (lastV - min) / aralik) * (H - pad * 2);
    ctx.beginPath(); ctx.arc(lastX, lastY, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = renk; ctx.fill();
}

async function sunucudanVeriYukle() {
    try {
        const data = await httpGet(VERI_URL + '?t=' + Date.now());

        if (data.status === 'success') {
            veriler.manuelGramMiktar   = data.gramMiktar    || 98;
            veriler.manuelCeyrekMiktar = data.ceyrekMiktar  || 14;
            veriler.nGramMiktar        = data.nGramMiktar   || veriler.manuelGramMiktar;
            veriler.nCeyrekMiktar      = data.nCeyrekMiktar || veriler.manuelCeyrekMiktar;
            if (veriler.nGramMiktar !== veriler.manuelGramMiktar || veriler.nCeyrekMiktar !== veriler.manuelCeyrekMiktar) {
                veriler.nGramMiktar   = veriler.manuelGramMiktar;
                veriler.nCeyrekMiktar = veriler.manuelCeyrekMiktar;
                sunucuyaVeriKaydet();
            }
            veriler.manuelGramFiyat    = data.manuelGramFiyat   || 0;
            veriler.manuelCeyrekFiyat  = data.manuelCeyrekFiyat || 0;
            veriler.sonGuncelleme      = data.sonGuncelleme || null;

            const eskiGramFiyat   = parseFloat(data.gramFiyat)   || 0;
            const eskiCeyrekFiyat = parseFloat(data.ceyrekFiyat) || 0;
            if (eskiGramFiyat > 0) {
                const eskiPortfoyDegeri = (veriler.nGramMiktar * eskiGramFiyat) +
                                          (veriler.nCeyrekMiktar * eskiCeyrekFiyat);
                if (eskiPortfoyDegeri > 0) {
                    portfolyoOncekiDeger = eskiPortfoyDegeri;
                    portfolyoIlkYukleme  = false;
                }
            }
        }
    } catch (e) {
        console.warn('Sunucudan veri yüklenemedi:', e.message);
    }
    ekraniGuncelle();
}

async function sunucuyaVeriKaydet() {
    try {
        const formData = new URLSearchParams();
        formData.append('gramMiktar',        veriler.manuelGramMiktar);
        formData.append('ceyrekMiktar',      veriler.manuelCeyrekMiktar);
        formData.append('nGramMiktar',       veriler.nGramMiktar);
        formData.append('nCeyrekMiktar',     veriler.nCeyrekMiktar);
        formData.append('gramFiyat',         veriler.anlıkGramAlisFiyat);
        formData.append('ceyrekFiyat',       veriler.anlıkCeyrekAlisFiyat);
        formData.append('manuelGramFiyat',   veriler.manuelGramFiyat);
        formData.append('manuelCeyrekFiyat', veriler.manuelCeyrekFiyat);

        const data = await httpPost(SAVE_URL, formData.toString());
        if (data.status !== 'success') console.warn('Sunucu kayıt hatası:', data.message);
    } catch (e) {
        console.warn('Sunucuya kaydedilemedi:', e.message);
    }
}

function durumGuncelle(durum, mesaj) {
    const el = document.getElementById('apiDurum');
    if (!el) return;
    if (durum === 'online') {
        el.className = 'status-badge status-online';
        el.innerHTML = '🟢 ' + mesaj;
    } else if (durum === 'loading') {
        el.className = 'status-badge status-loading';
        el.innerHTML = '<span class="loading"></span> ' + mesaj;
    } else {
        el.className = 'status-badge status-offline';
        el.innerHTML = '🔴 ' + mesaj;
    }
}

async function anlikFiyatlariGetir() {
    durumGuncelle('loading', 'Fiyatlar alınıyor...');
    try {
        const data = await httpGet(PROXY_URL + '?t=' + Date.now());
        parseAPIResponse(data);
    } catch (error) {
        console.error('API hatası:', error.message, error.name);
        durumGuncelle('offline', error.message.substring(0, 25));
        ekraniGuncelle();
    }
}

function parseAPIResponse(data) {
    try {
        if (data.error) throw new Error(data.error);

        let gramFiyat   = 0;
        let ceyrekFiyat = 0;

        // Türkçe ve İngilizce format desteği: "6.027,50" veya "6027.50"
        function parseFiyat(val) {
            if (!val) return 0;
            let s = String(val).trim();
            // Türkçe format: nokta=binlik ayraç, virgül=ondalık
            if (s.includes(',')) s = s.replace(/\./g, '').replace(',', '.');
            return parseFloat(s) || 0;
        }

        if (data.gram && data.gram.alis)   gramFiyat   = parseFiyat(data.gram.alis);
        if (data.ceyrek && data.ceyrek.alis) ceyrekFiyat = parseFiyat(data.ceyrek.alis);
        if (isNaN(gramFiyat)   || gramFiyat   <= 0) gramFiyat   = 0;
        if (isNaN(ceyrekFiyat) || ceyrekFiyat <= 0) ceyrekFiyat = 0;
        if (gramFiyat > 0 && ceyrekFiyat === 0) ceyrekFiyat = gramFiyat * 1.75;

        if (gramFiyat > 0) {
            veriler.anlıkGramAlisFiyat   = gramFiyat;
            veriler.anlıkCeyrekAlisFiyat = ceyrekFiyat;
            if (data.gram?.satis)   veriler.anlıkGramSatisFiyat   = parseFiyat(data.gram.satis);
            if (data.ceyrek?.satis) veriler.anlıkCeyrekSatisFiyat = parseFiyat(data.ceyrek.satis);
            else if (veriler.anlıkGramSatisFiyat > 0) veriler.anlıkCeyrekSatisFiyat = veriler.anlıkGramSatisFiyat * 1.75;

            sunucuyaVeriKaydet();
            ekraniGuncelle();

            const saat = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Istanbul' });
            durumGuncelle('online', saat);
        } else {
            throw new Error('Geçerli fiyat çıkarılamadı');
        }
    } catch (error) {
        console.error('API parse hatası:', error.message);
        throw error;
    }
}

const _REFERANS_FIYAT = { gramAlis: 6772, gramSatis: 6850, ceyrekAlis: 10905, ceyrekSatis: 11500 };
const _oncekiFiyat = Object.assign(_REFERANS_FIYAT, _lsYukle());
const _okDurumu    = Object.assign({ gramAlis: null, gramSatis: null, ceyrekAlis: null, ceyrekSatis: null }, _lsOkYukle());

function _lsYukle()   { try { return JSON.parse(localStorage.getItem('altinFiyatlari_onceki'))   || {}; } catch(e) { return {}; } }
function _lsOkYukle() { try { return JSON.parse(localStorage.getItem('altinFiyatlari_okDurumu')) || {}; } catch(e) { return {}; } }
function _lsKaydet(obj)   { try { localStorage.setItem('altinFiyatlari_onceki',   JSON.stringify(obj)); } catch(e) {} }
function _lsOkKaydet(obj) { try { localStorage.setItem('altinFiyatlari_okDurumu', JSON.stringify(obj)); } catch(e) {} }

function _okSvg(yon) {
    return '';
}

function _fiyatGuncelle(elemId, yeniFiyat, oncekiKey) {
    const el = document.getElementById(elemId);
    if (!el) return;
    const metin = Math.round(yeniFiyat).toLocaleString('tr-TR');
    const eskiFiyat = _oncekiFiyat[oncekiKey];

    if (yeniFiyat > eskiFiyat)          _okDurumu[oncekiKey] = 'yukari';
    else if (yeniFiyat < eskiFiyat)     _okDurumu[oncekiKey] = 'asagi';
    else if (_okDurumu[oncekiKey] === null) _okDurumu[oncekiKey] = 'yukari';

    const yon = _okDurumu[oncekiKey];
    el.innerHTML = metin + _okSvg(yon);

    el.className = 'pill-v';
    if (yon === 'yukari') el.classList.add('up');
    else if (yon === 'asagi') el.classList.add('down');

    if (yeniFiyat !== eskiFiyat) {
        const cls = yeniFiyat > eskiFiyat ? 'fv-green-flash' : 'fv-red-flash';
        el.classList.remove('fv-green-flash', 'fv-red-flash');
        void el.offsetWidth;
        el.classList.add(cls);
        el.style.borderRadius = '4px';
        el.style.padding = '0 2px';
        setTimeout(() => { el.classList.remove(cls); el.style.padding = ''; el.style.borderRadius = ''; }, 1300);
    }

    _oncekiFiyat[oncekiKey] = yeniFiyat;
    _lsKaydet(_oncekiFiyat);
    _lsOkKaydet(_okDurumu);
}

function hesaplaToplamlar() {
    const toplamAltinGram  = veriler.manuelGramMiktar + (veriler.manuelCeyrekMiktar * 1.75);
    const anlıkToplam      = (veriler.manuelGramMiktar * veriler.anlıkGramAlisFiyat) + (veriler.manuelCeyrekMiktar * veriler.anlıkCeyrekAlisFiyat);
    const manuelToplam     = (veriler.manuelGramMiktar * veriler.manuelGramFiyat)    + (veriler.manuelCeyrekMiktar * veriler.manuelCeyrekFiyat);
    const nisapTutari      = (veriler.nGramMiktar * veriler.anlıkGramAlisFiyat)     + (veriler.nCeyrekMiktar * veriler.anlıkCeyrekAlisFiyat);
    const nmToplamTutari   = (veriler.nGramMiktar * veriler.manuelGramFiyat)         + (veriler.nCeyrekMiktar * veriler.manuelCeyrekFiyat);
    const fark             = manuelToplam - anlıkToplam;
    const nToplamAltinGram = veriler.nGramMiktar + (veriler.nCeyrekMiktar * 1.75);

    document.getElementById('toplamAltinDisplay').innerText  = `${parseFloat(toplamAltinGram.toFixed(2))} gr`;
    document.getElementById('nToplamAltinDisplay').innerText = `${parseFloat(nToplamAltinGram.toFixed(2))}`;
    document.getElementById('toplamDegerDisplay').innerText  = `${Math.round(anlıkToplam).toLocaleString('tr-TR')} TL`;
    document.getElementById('manuelToplamDisplay').innerText = `${Math.round(manuelToplam).toLocaleString('tr-TR')} TL`;

    document.getElementById('nisapTutari').innerText = Math.round(nisapTutari).toLocaleString('tr-TR');
    portfolyoSparklineGuncelle(nisapTutari);

    document.getElementById('nmToplamTutari').innerText = Math.round(nmToplamTutari).toLocaleString('tr-TR');
    document.getElementById('manuelToplamTutari').innerText = `${Math.round(anlıkToplam).toLocaleString('tr-TR')} TL`;

    const farkElement = document.getElementById('farkDisplay');
    if (fark > 0)       farkElement.innerHTML = `+${fark.toLocaleString('tr-TR', { minimumFractionDigits: 2 })} TL (Manuel Yüksek)`;
    else if (fark < 0)  farkElement.innerHTML = `${fark.toLocaleString('tr-TR', { minimumFractionDigits: 2 })} TL (Anlık Yüksek)`;
    else                farkElement.innerHTML = `0,00 TL (Eşit)`;

    zekatHesapla(toplamAltinGram);
    hedefGuncelle();
}

function zekatHesapla(toplamGram) {
    const today        = new Date();
    const zekatVadesi  = new Date(ZEKAT_TARIHI);
    zekatVadesi.setFullYear(zekatVadesi.getFullYear() + 1);
    const kalanMs   = zekatVadesi - today;
    const kalanGun  = Math.ceil(kalanMs / (1000 * 60 * 60 * 24));
    const el        = document.getElementById('zekatSonucDisplay');

    if (today >= zekatVadesi && toplamGram >= ZEKAT_NISAB && veriler.anlıkGramAlisFiyat > 0) {
        const zm = toplamGram * 0.025;
        const zd = zm * veriler.anlıkGramAlisFiyat;
        el.innerHTML = `Zekat: ⚠️ Düşer! ${zm.toFixed(2)} gr (${zd.toLocaleString('tr-TR', { minimumFractionDigits: 0 })} TL)`;
    } else if (today < zekatVadesi) {
        el.innerHTML = `Zekat: 05.03.2027 — ${kalanGun} gün kaldı`;
    } else {
        el.innerHTML = 'Zekat: ❌ Düşmüyor.';
    }
}

let hedefTutar  = 1000000;
let nHedefTutar = 1000000;

function hedefGuncelle() {
    const fiyatGram   = veriler.anlıkGramAlisFiyat   || veriler.manuelGramFiyat   || 0;
    const fiyatCeyrek = veriler.anlıkCeyrekAlisFiyat || veriler.manuelCeyrekFiyat || 0;
    const nDeger      = (veriler.nGramMiktar * fiyatGram) + (veriler.nCeyrekMiktar * fiyatCeyrek);
    const nEksik      = nHedefTutar - nDeger;

    document.getElementById('nHedefTutarLabel').textContent = nHedefTutar.toLocaleString('tr-TR') + ' TL';
    const nEksikEl  = document.getElementById('nHedefEksikTutar');
    const nGramEl   = document.getElementById('nHedefGerekenGram');
    const nCeyrekEl = document.getElementById('nHedefGerekenCeyrek');
    const nBarEl    = document.getElementById('nHedefProgressBar');

    if (nEksik <= 0) {
        nEksikEl.textContent  = '✅ Hedefe ulaşıldı!';
        nGramEl.textContent   = '—';
        nCeyrekEl.textContent = '—';
        nBarEl.style.width    = '100%';
    } else {
        nEksikEl.textContent  = Math.round(nEksik).toLocaleString('tr-TR') + ' TL';
        nGramEl.textContent   = fiyatGram   > 0 ? Math.round(nEksik / fiyatGram)   + ' gr'   : '-- gr';
        nCeyrekEl.textContent = fiyatCeyrek > 0 ? Math.round(nEksik / fiyatCeyrek) + ' adet' : '-- adet';
        nBarEl.style.width    = Math.min(100, (nDeger / nHedefTutar) * 100).toFixed(1) + '%';
    }
}

    if (ceyrekModal.classList.contains('open') && e.target === ceyrekModal) ceyrekModalKapat();
    if (manuelModal.classList.contains('open') && e.target === manuelModal) manuelModalKapat();
});

// Enter ile kaydet
document.getElementById('modalGramInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') modalMiktarKaydet('gram');
});
document.getElementById('modalCeyrekInput').addEventListener('keydown', function(e) {

});

// ============================================================
// PULL TO REFRESH
// ============================================================
let startY = 0;
let isRefreshing = false;

document.addEventListener('touchstart', function(e) {
    if (document.documentElement.scrollTop === 0) startY = e.touches[0].pageY;
}, { passive: true });

document.addEventListener('touchmove', function(e) {
    if (isRefreshing) return;
    const pullDistance = e.touches[0].pageY - startY;
    if (document.documentElement.scrollTop === 0 && pullDistance > 0) {
        const indicator = document.getElementById('pullToRefreshIndicator');
        if (pullDistance > 100) indicator.classList.add('show');
        else indicator.classList.remove('show');
    }
}, { passive: true });

document.addEventListener('touchend', function(e) {
    if (isRefreshing) return;
    const indicator    = document.getElementById('pullToRefreshIndicator');
    const pullDistance = e.changedTouches[0].pageY - startY;
    if (document.documentElement.scrollTop === 0 && pullDistance > 100) {
        isRefreshing = true;
        indicator.classList.add('show');
        fiyatlariYenile();
        setTimeout(() => { indicator.classList.remove('show'); isRefreshing = false; }, 3000);
    } else {
        indicator.classList.remove('show');
    }
}, { passive: true });

document.addEventListener('keydown', function(e) {
    if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) { e.preventDefault(); fiyatlariYenile(); }
});

// BAŞLANGIÇ
// ============================================================
window.onload = async function() {
    durumGuncelle('loading', 'Yükleniyor...');
    await sunucudanVeriYukle();
    anlikFiyatlariGetir();
};
