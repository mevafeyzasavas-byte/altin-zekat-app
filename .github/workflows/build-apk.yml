name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu İndir
        uses: actions/checkout@v4

      - name: Java Kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: HTML'yi www klasörüne taşı
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Capacitor Kur
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: capacitor.config.json oluştur
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.altinportfoy.app",
            "appName": "Altın Portföy",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            }
          }
          CAPEOF

      - name: Android Platform Ekle
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Gradle İzni Ver
        run: chmod +x android/gradlew

      - name: APK Derle
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: APK'yı Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: altin-portfoy-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
