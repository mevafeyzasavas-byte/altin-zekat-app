name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu İndir
        uses: actions/checkout@v4

      - name: Java Kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: HTML'yi www klasörüne taşı
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Capacitor Kur
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: capacitor.config.json oluştur
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.altinportfoy.app",
            "appName": "Altın Portföy",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            },
            "android": {
              "allowMixedContent": true
            }
          }
          CAPEOF

      - name: Android Platform Ekle
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Network Security Config ekle
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'NETEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                      <certificates src="user" />
                  </trust-anchors>
              </base-config>
          </network-security-config>
          NETEOF

      - name: AndroidManifest güncelle
        run: |
          sed -i 's|<application|<application android:usesCleartextTraffic="true" android:networkSecurityConfig="@xml/network_security_config"|' \
            android/app/src/main/AndroidManifest.xml
          # INTERNET izni kontrol et
          grep -q "INTERNET" android/app/src/main/AndroidManifest.xml || \
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET"/>\n</manifest>|' \
            android/app/src/main/AndroidManifest.xml

      - name: MainActivity'de mixed content aç
        run: |
          cat > android/app/src/main/java/com/altinportfoy/app/MainActivity.java << 'JAVAEOF'
          package com.altinportfoy.app;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
              @Override
              protected void onStart() {
                  super.onStart();
                  WebView webView = getBridge().getWebView();
                  WebSettings settings = webView.getSettings();
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
              }
          }
          JAVAEOF

      - name: Gradle İzni Ver
        run: chmod +x android/gradlew

      - name: APK Derle
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: APK'yı Artifact Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: altin-portfoy-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
